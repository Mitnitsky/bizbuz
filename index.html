<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg?v=4" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=4" />
    <link rel="apple-touch-icon" href="/icon-180.png?v=4" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7e22ce" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1f2937" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BizBuz" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="BizBuz (ביזבוז) — Smart family financial tracker for Israeli households. Track expenses, savings, loans, and investments together." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://www.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://apis.google.com" />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&family=Rubik:wght@400;500;600;700&display=optional" />
    <link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&family=Rubik:wght@400;500;600;700&display=optional" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&family=Rubik:wght@400;500;600;700&display=optional" rel="stylesheet" /></noscript>
    <title>BizBuz</title>
    <script>
      // Set dir/lang early to avoid LTR→RTL flash
      (function(){var l=localStorage.getItem('bizbuz-locale');if(l==='he'){document.documentElement.dir='rtl';document.documentElement.lang='he'}})();
    </script>
  </head>
  <body>
    <div id="app">
      <!-- App shell — mirrors login page for instant LCP, replaced when Vue mounts -->
      <main id="app-shell" style="display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;background:#f9fafb;padding:16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
        <div style="width:100%;max-width:384px;text-align:center">
          <div style="margin-bottom:32px">
            <img src="/icon.svg" alt="BizBuz" width="48" height="48" style="margin:0 auto 12px;display:block" />
            <h1 style="font-size:1.875rem;font-weight:700;color:#111827;margin:0">BizBuz</h1>
            <p style="color:#6b7280;margin-top:4px;font-size:14px">Family financial tracker</p>
          </div>
          <div style="background:#fff;border-radius:12px;box-shadow:0 4px 6px -1px rgba(0,0,0,.1);padding:24px;text-align:left">
            <div style="margin-bottom:16px">
              <div style="height:14px;width:40px;background:#e5e7eb;border-radius:4px;margin-bottom:6px"></div>
              <div style="height:40px;border:1px solid #d1d5db;border-radius:8px;background:#fff"></div>
            </div>
            <div style="margin-bottom:16px">
              <div style="height:14px;width:56px;background:#e5e7eb;border-radius:4px;margin-bottom:6px"></div>
              <div style="height:40px;border:1px solid #d1d5db;border-radius:8px;background:#fff"></div>
            </div>
            <div style="height:42px;border-radius:8px;background:#7e22ce;display:flex;align-items:center;justify-content:center">
              <div style="width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sk-spin .8s linear infinite"></div>
            </div>
          </div>
        </div>
      </main>
      <style>
        @keyframes sk-spin{to{transform:rotate(360deg)}}
        @media(prefers-color-scheme:dark){#app-shell{background:#111827!important}#app-shell h1{color:#d1d5db!important}#app-shell>div>div:last-child{background:#1f2937!important}#app-shell>div>div:last-child div{border-color:#374151!important;background:#1f2937!important}#app-shell>div>div:last-child>div:last-child{background:#7e22ce!important}}
      </style>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
